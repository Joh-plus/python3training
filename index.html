<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Python3認定基礎試験対策</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Outfit:wght@400;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</head>

<body>
  <header>
    <h1 id="main-title">Python3_検定対策</h1>
  </header>

  <div class="info-bar" style="display: none;">
    <div class="progress">
      <span id="current-question-num">1</span>問目 / 全<span id="total-questions">10</span>問
    </div>
    <div class="review-check">
      <label><input type="checkbox" id="review-later"> あとで見直す</label>
    </div>
  </div>
  <div id="start-screen" class="start-screen">
    <div class="title-wrapper">
      <h1 id="start-title">Python 3 <span>検定対策 模擬問題集</span></h1>
      <p class="subtitle">学習を開始するコースを選択してください</p>
    </div>

    <div class="dashboard-container">
      <!-- エンジニア認定基礎試験 -->
      <section class="category-section">
        <div class="category-header">
          <div class="category-icon-bg">
            <svg class="category-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
            </svg>
          </div>
          <div class="header-text">
            <h2>Python 3 エンジニア認定基礎試験</h2>
            <p>Pythonの基礎知識と文法をマスターする</p>
          </div>
        </div>
        <div class="course-grid">
          <button class="course-card" onclick="startQuiz('pastQuestions.json', '過去問題')">
            <span class="card-label">Official</span>
            <div class="card-header-flex">
              <img src="images/oddysey.png" alt="Odyssey Logo" class="card-logo">
              <h3>過去問題</h3>
            </div>
          </button>
          <button class="course-card" onclick="startQuiz('python_exam_60_questions_complete.json', 'pyq （基本61問）')">
            <span class="card-label">Training</span>
            <div class="card-header-flex">
              <img src="images/pyq_logo_color.svg" alt="PyQ Logo" class="card-logo">
              <h3>PyQ （基本61問）</h3>
            </div>
          </button>
          <button class="course-card" onclick="startQuiz('pyq.json', 'pyq (実践40問)')">
            <span class="card-label">Advanced</span>
            <div class="card-header-flex">
              <img src="images/pyq_logo_color.svg" alt="PyQ Logo" class="card-logo">
              <h3>PyQ (実践40問)</h3>
            </div>
          </button>
          <button class="course-card" onclick="startQuiz('primeStudy_01.json', 'Prime Study (第1回)')">
            <span class="card-label">External</span>
            <div class="card-header-flex">
              <img src="images/logo_ps.png" alt="Prime Study Logo" class="card-logo card-logo--ps">
              <h3>Prime Study<br> 第1回</h3>
            </div>
          </button>
          <button class="course-card" onclick="startQuiz('primeStudy_02.json', 'Prime Study (第2回)')">
            <span class="card-label">External</span>
            <div class="card-header-flex">
              <img src="images/logo_ps.png" alt="Prime Study Logo" class="card-logo card-logo--ps">
              <h3>Prime Study<br> 第2回</h3>
            </div>
          </button>
          <button class="course-card" onclick="startQuiz('primeStudy_03.json', 'Prime Study (第3回)')">
            <span class="card-label">External</span>
            <div class="card-header-flex">
              <img src="images/logo_ps.png" alt="Prime Study Logo" class="card-logo card-logo--ps">
              <h3>Prime Study<br> 第3回</h3>
            </div>
          </button>
        </div>
      </section>

      <!-- データ分析基礎試験 -->
      <section class="category-section">
        <div class="category-header category-header--data">
          <div class="category-icon-bg">
            <svg class="category-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path>
              <path d="M22 12A10 10 0 0 0 12 2v10z"></path>
            </svg>
          </div>
          <div class="header-text">
            <h2>Python 3 エンジニア認定データ分析試験</h2>
            <p>データライブラリと分析の基礎を学ぶ</p>
          </div>
        </div>
        <div class="course-grid">
          <button class="course-card course-card--data"
            onclick="startQuiz('data_analysis_mock_questions.json', '過去問題')">
            <span class="card-label">Official</span>
            <div class="card-header-flex">
              <img src="images/oddysey.png" alt="Odyssey Logo" class="card-logo">
              <h3>過去問題</h3>
            </div>
          </button>
          <button class="course-card course-card--data"
            onclick="startQuiz('data_analysis_mock_questions_plus.json', '過去問題（追加）')">
            <span class="card-label">Official</span>
            <div class="card-header-flex">
              <img src="images/oddysey.png" alt="Odyssey Logo" class="card-logo">
              <h3>過去問題（追加）</h3>
            </div>
          </button>
        </div>
      </section>
    </div>
  </div>

  <div class="main-container" style="display: none;">
    <div class="question-section">
      <h2 id="question"></h2>
      <pre id="code-sample" style="display: none;"></pre>
      <div id="execution-section" style="display: none;">
        <p class="execution-label">【期待する結果】</p>
        <div id="execution-result" class="execution-result-box"></div>
      </div>
    </div>
    <div id="options" class="options-list"></div>

    <div id="result" style="display: none;"></div>
    <div id="explanation" style="display: none;"></div>
  </div>

  <footer style="display: none;">
    <button id="prev" class="nav-btn">前へ</button>
    <button id="summary-btn" class="nav-btn">問題一覧</button>
    <button id="next" class="nav-btn" style="display: none;">次へ</button>
  </footer>
  <script src="script.js"></script>
</body>

</html>
